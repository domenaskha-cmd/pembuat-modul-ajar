<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembuat Modul Ajar Kurikulum Merdeka</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a365d; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #4a5568; margin-top: 0; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #2d3748; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; background-color: #2b6cb0; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #2c5282; }
        .hasil-box { margin-top: 30px; padding: 20px; border: 2px dashed #bba; background: #fffaf0; border-radius: 8px; display: none; }
        .hasil-box h2 { color: #2c5282; text-align: center; border-bottom: 2px solid #2b6cb0; padding-bottom: 10px; }
        .cetak-btn { background-color: #38a169; margin-top: 15px; }
        .cetak-btn:hover { background-color: #2f855a; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Pembuat Modul Ajar</h1>
    <p class="subtitle">Kurikulum Merdeka Otomatis & Praktis</p>
    
    <div class="form-group">
        <label>Nama Penyusun / Guru:</label>
        <input type="text" id="namaGuru" placeholder="Contoh: Domena Skha, S.Pd.">
    </div>

    <div class="form-group">
        <label>Nama Sekolah:</label>
        <input type="text" id="namaSekolah" placeholder="Contoh: SDN 1 Merdeka">
    </div>

    <div class="form-group">
        <label>Mata Pelajaran:</label>
        <select id="mapel">
            <option value="Bahasa Indonesia">Bahasa Indonesia</option>
            <option value="Matematika">Matematika</option>
            <option value="IPAS">IPAS</option>
            <option value="Pendidikan Pancasila">Pendidikan Pancasila</option>
            <option value="Seni Budaya">Seni Budaya</option>
        </select>
    </div>

    <div class="form-group">
        <label>Fase / Kelas & Semester:</label>
        <input type="text" id="faseKelas" placeholder="Contoh: Fase B / Kelas 4 - Semester 1">
    </div>

    <div class="form-group">
        <label>Tujuan Pembelajaran (TP):</label>
        <textarea id="tujuan" placeholder="Tuliskan tujuan pembelajaran yang ingin dicapai..."></textarea>
    </div>

    <div class="form-group">
        <label>Langkah-Langkah Kegiatan Pembelajaran:</label>
        <textarea id="kegiatan" placeholder="1. Pendahuluan (Apersepsi)&#10;2. Kegiatan Inti (Eksplorasi)&#10;3. Penutup (Refleksi)"></textarea>
    </div>

    <button onclick="susunModul()">✨ Susun & Generate Modul Ajar</button>

    <div id="hasilBox" class="hasil-box">
        <h2>INFORMASI MODUL AJAR</h2>
        <p><strong>Penyusun:</strong> <span id="resNama"></span></p>
        <p><strong>Instansi:</strong> <span id="resSekolah"></span></p>
        <p><strong>Mata Pelajaran:</strong> <span id="resMapel"></span></p>
        <p><strong>Fase/Kelas:</strong> <span id="resFase"></span></p>
        <hr>
        <h3>A. TUJUAN PEMBELAJARAN</h3>
        <p id="resTujuan" style="white-space: pre-line;"></p>
        <hr>
        <h3>B. KEGIATAN PEMBELAJARAN</h3>
        <p id="resKegiatan" style="white-space: pre-line;"></p>
        
        <button class="cetak-btn" onclick="window.print()">🖨️ Cetak / Simpan ke PDF</button>
    </div>
</div>

<script>
function susunModul() {
    // Ambil semua data dari form input
    const nama = document.getElementById('namaGuru').value || '-';
    const sekolah = document.getElementById('namaSekolah').value || '-';
    const mapel = document.getElementById('mapel').value;
    const fase = document.getElementById('faseKelas').value || '-';
    const tujuan = document.getElementById('tujuan').value || 'Belum diisi.';
    const kegiatan = document.getElementById('kegiatan').value || 'Belum diisi.';

    // Masukkan data ke kotak hasil
    document.getElementById('resNama').innerText = nama;
    document.getElementById('resSekolah').innerText = sekolah;
    document.getElementById('resMapel').innerText = mapel;
    document.getElementById('resFase').innerText = fase;
    document.getElementById('resTujuan').innerText = tujuan;
    document.getElementById('resKegiatan').innerText = kegiatan;

    // Tampilkan kotak hasil ke layar
    document.getElementById('hasilBox').style.display = 'block';
    
    // Gulir otomatis ke tampilan hasil
    document.getElementById('hasilBox').scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
