<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Pembuat Modul Ajar Otomatis via AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a365d; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #4a5568; margin-top: 0; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #2d3748; }
        input[type="text"] { width: 100%; padding: 11px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; background-color: #2b6cb0; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background-color: #2c5282; }
        .hasil-box { margin-top: 25px; padding: 20px; border: 2px dashed #2b6cb0; background: #f7fafc; border-radius: 8px; display: none; }
        textarea.prompt-area { width: 100%; height: 250px; padding: 12px; border: 1px solid #a0aec0; border-radius: 6px; font-family: monospace; font-size: 13px; box-sizing: border-box; background: #fff; }
        .copy-btn { background-color: #319795; margin-top: 10px; }
        .copy-btn:hover { background-color: #2c7a7b; }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 Auto-Modul Ajar Generator</h1>
    <p class="subtitle">Cukup isi info dasar, biarkan AI yang menulis modul lengkapnya!</p>
    
    <div class="form-group">
        <label>Nama Penyusun / Guru:</label>
        <input type="text" id="namaGuru" placeholder="Contoh: Domena Skha, S.Pd.">
    </div>

    <div class="form-group">
        <label>Nama Sekolah / Madrasah:</label>
        <input type="text" id="namaSekolah" placeholder="Contoh: SDN 1 Merdeka">
    </div>

    <div class="form-group">
        <label>Mata Pelajaran:</label>
        <input type="text" id="mapel" placeholder="Contoh: IPAS / Matematika / Bahasa Indonesia">
    </div>

    <div class="form-group">
        <label>Fase / Kelas & Semester:</label>
        <input type="text" id="faseKelas" placeholder="Contoh: Fase B / Kelas 4 - Semester 1">
    </div>

    <div class="form-group">
        <label>Tema / Bab / Materi Pokok:</label>
        <input type="text" id="temaBab" placeholder="Contoh: Bab 4 (Siklus Air dan Kelestarian Lingkungan)">
    </div>

    <div class="form-group">
        <label>Alokasi Waktu:</label>
        <input type="text" id="alokasi" placeholder="Contoh: 2 x 35 Menit">
    </div>

    <button onclick="generateAiPrompt()">✨ Buat Perintah Cetak Modul (AI Prompt)</button>

    <!-- Kotak Hasil Prompt -->
    <div id="hasilBox" class="hasil-box">
        <h3 style="margin-top:0; color:#2b6cb0;">📋 Langkah Selanjutnya:</h3>
        <p style="font-size: 14px; margin-bottom: 15px;">Salin teks perintah di bawah ini, lalu langsung tempelkan (*paste*) ke chat Gemini/ChatGPT Anda.</p>
        
        <textarea id="promptOutput" class="prompt-area" readonly></textarea>
        
        <button class="copy-btn" onclick="salinPrompt()">✂️ Salin Perintah (Copy Prompt)</button>
    </div>
</div>

<script>
function generateAiPrompt() {
    const nama = document.getElementById('namaGuru').value || '[Nama Guru]';
    const sekolah = document.getElementById('namaSekolah').value || '[Nama Sekolah]';
    const mapel = document.getElementById('mapel').value || '[Mata Pelajaran]';
    const fase = document.getElementById('faseKelas').value || '[Fase/Kelas]';
    const tema = document.getElementById('temaBab').value || '[Tema/Bab]';
    const waktu = document.getElementById('alokasi').value || '[Alokasi Waktu]';

    // Membuat teks perintah super spesifik sesuai file dokumen sistematika
    const promptText = `Halo AI, tolong buatkan dokumen lengkap "Modul Ajar Kurikulum Merdeka" yang ditulis secara sangat rinci, profesional, dan siap pakai. 

Gunakan data identitas berikut:
- Nama Penyusun: ${nama}
- Nama Satuan Pendidikan: ${sekolah}
- Mata Pelajaran: ${mapel}
- Fase / Kelas & Semester: ${fase}
- Tema / Bab / Materi Pokok: ${tema}
- Alokasi Waktu: ${waktu}

Susun secara berurutan dan rapi wajib mengikuti Struktur Sistematika Resmi berikut ini:

1. INFORMASI UMUM
A. Identitas Modul (Sebutkan Nama, Sekolah, Mapel, Fase/Kelas, Alokasi Waktu)
B. Kompetensi Awal (Pengetahuan/keterampilan dasar sebelum bab ini)
C. Profil Pelajar Pancasila (Pilih beberapa elemen dimensi P5 yang paling cocok beserta deskripsi penerapannya, contoh: "Mandiri: Peserta didik menunjukkan perilaku...")
D. Sarana dan Prasarana (Media, Alat/Bahan, Sumber Belajar yang relevan)
E. Target Peserta Didik (Peserta didik reguler/umum)
F. Model & Metode Pembelajaran (Tentukan model yang aktif dan menyenangkan)

2. KOMPONEN INTI
A. Tujuan Pembelajaran (Gunakan unsur ABCD yang diurai jelas)
B. Pemahaman Bermakna (Manfaat materi dalam kehidupan nyata)
C. Pertanyaan Pemantik (Pertanyaan menarik pemancing rasa ingin tahu siswa)
D. Kegiatan Pembelajaran (Tulis urutan konkret menggunakan kalimat aksi aktif yang terbagi atas: Pendahuluan, Inti [memuat mengamati, menanya, mengeksplorasi, mengasosiasi, mengomunikasikan], dan Penutup)
E. Asesmen (Sebutkan jenis Diagnostik, Formatif, dan Sumatif)
F. Pengayaan dan Remedial

3. LAMPIRAN UTAMA
A. Lembar Kerja Peserta Didik (LKPD): Buatkan instrumen tes evaluasi tertulis hasil belajar berupa:
   - 10 Soal Pilihan Ganda (PG) lengkap dengan opsi jawaban A, B, C, D.
   - 5 Soal Uraian/Esai yang mendalam.
B. Kunci Jawaban & Rubrik Penilaian: Berikan kunci jawaban eksak untuk 10 soal PG tadi, dan berikan kunci teks jawaban beserta pedoman rubrik penskorannya untuk 5 soal uraian.
C. Bahan Bacaan Guru & Peserta Didik (Ringkasan materi bab ini)
D. Glosarium (Daftar istilah penting dan artinya)
E. Daftar Pustaka

Tolong buatkan teks modul ajar ini secara utuh, lengkap, dan tanpa ada bagian teks yang dipotong atau disingkat.`;

    document.getElementById('promptOutput').value = promptText;
    document.getElementById('hasilBox').style.display = 'block';
    document.getElementById('hasilBox').scrollIntoView({ behavior: 'smooth' });
}

function salinPrompt() {
    const copyText = document.getElementById("promptOutput");
    copyText.select();
    copyText.setSelectionRange(0, 99999); // Untuk perangkat mobile
    navigator.clipboard.writeText(copyText.value);
    alert("Perintah berhasil disalin! Sekarang silakan paste/tempel ke chat Gemini/ChatGPT.");
}
</script>

</body>
</html>
