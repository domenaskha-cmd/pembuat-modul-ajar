<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembuat Modul Ajar</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f7f6; padding: 50px; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #2c3e50; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Aplikasi Pembuat Modul Ajar Otomatis ✨</h1>
        <p>Selamat! Tampilan antarmuka utama aplikasi Anda berhasil terhubung dengan server cloud Vercel.</p>
        <button onclick="alert('Fitur modul siap dikembangkan!')">Mulai Buat Modul</button>
    </div>
</body>
</html>
